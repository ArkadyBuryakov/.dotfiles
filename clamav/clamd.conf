# ClamAV Daemon Configuration

# Logging
LogFile /var/log/clamav/clamd.log
LogTime yes
LogSyslog no
ExtendedDetectionInfo yes

# Socket
LocalSocket /run/clamav/clamd.ctl

# User
User clamav

# Scanning
MaxThreads 6
MaxDirectoryRecursion 20
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
ScanHTML yes
ScanArchive yes
DetectPUA yes
HeuristicAlerts yes
Bytecode yes

# Excluded paths — skip known false positives (regex)
ExcludePath ^/home/[^/]+/\.cache/mozilla
ExcludePath ^/home/[^/]+/\.cache/zen
ExcludePath ^/home/[^/]+/\.config/libreoffice
ExcludePath ^/usr/lib/libreoffice
ExcludePath ^/usr/share/libreoffice
ExcludePath ^/home/[^/]+/\.local/share/Steam/steamapps/common/Proton
ExcludePath ^/home/[^/]+/\.snapshots
ExcludePath ^/var/lib/containerd

# On-Access Scanning
OnAccessIncludePath /home
OnAccessExcludeUname clamav
OnAccessPrevention no
OnAccessExtraScanning yes

# Virus Event — runs on every detection
VirusEvent /etc/clamav/virus-event.bash
